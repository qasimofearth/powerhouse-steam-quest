  <!-- header bar (over the feed) -->
  <rect x="14" y="14" width="312" height="78" rx="40" fill="url(#hdr)"/>
  <rect x="14" y="60" width="312" height="32" fill="url(#hdr)"/>
  <circle cx="40" cy="42" r="6" fill="#fff" opacity="0.9"/>
  <text x="56" y="48" fill="#fff" font-size="20" font-weight="800">FitFeed</text>
  <!-- pulsing "bombardment" badge -->
  <circle cx="291" cy="42" r="15" fill="#fff">
    <animate attributeName="r" values="15;19;15" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="291" cy="42" r="14" fill="#fff"/>
  <text x="291" y="48" fill="#E0552B" font-size="14" font-weight="900" text-anchor="middle">99+</text>
  <text x="170" y="82" fill="#ffe6da" font-size="12" font-weight="800" text-anchor="middle" letter-spacing="1">“BOOST YOUR MITOCHONDRIA!”</text>

  <!-- notch + home bar -->
  <rect x="132" y="22" width="76" height="16" rx="8" fill="#0a0c12"/>
  <rect x="130" y="632" width="80" height="5" rx="2.5" fill="#555b6b"/>
</svg>
