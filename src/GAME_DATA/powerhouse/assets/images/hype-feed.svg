        <text x="84" y="103" fill="#ff6f9c" font-size="11" font-weight="700">♥ 201k   💬 14k   ↗ share</text>
      </g>

      <!-- duplicate of card 1 for a seamless wrap -->
      <g transform="translate(30,740)" filter="url(#soft)">
        <rect width="280" height="118" rx="12" fill="#222838"/>
        <rect width="60" height="118" rx="12" fill="url(#th1)"/><text x="30" y="68" font-size="26" text-anchor="middle">💪</text>
        <circle cx="84" cy="26" r="11" fill="#41506e"/>
        <text x="104" y="24" fill="#cdd6e6" font-size="12" font-weight="700">@biohack_brad</text>
        <rect x="206" y="16" width="60" height="18" rx="9" fill="#E0552B"/><text x="236" y="29" fill="#fff" font-size="10" font-weight="900" text-anchor="middle">SPONSORED</text>
        <text x="84" y="58" fill="#fff" font-size="16" font-weight="800">Boost mitochondria 300%!</text>
        <text x="84" y="80" fill="#9fb0c8" font-size="12">“This ONE trick doctors hate.”</text>
        <text x="84" y="103" fill="#ff6f9c" font-size="11" font-weight="700">♥ 84k   💬 2.1k   ↗ share</text>
