      <g transform="translate(30,612)" filter="url(#soft)">
        <rect width="280" height="118" rx="12" fill="#222838"/>
        <rect width="60" height="118" rx="12" fill="url(#th5)"/><text x="30" y="68" font-size="26" text-anchor="middle">⚡</text>
        <circle cx="84" cy="26" r="11" fill="#41506e"/>
        <text x="104" y="24" fill="#cdd6e6" font-size="12" font-weight="700">@energy.alpha</text>
        <rect x="206" y="16" width="60" height="18" rx="9" fill="#ff6f9c"/><text x="236" y="29" fill="#fff" font-size="10" font-weight="900" text-anchor="middle">SPONSORED</text>
