<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 660" width="340" height="660" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10131c"/>
      <stop offset="1" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="bezel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a3f4d"/>
      <stop offset="0.5" stop-color="#15171f"/>
      <stop offset="1" stop-color="#3a3f4d"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E0552B"/>
      <stop offset="1" stop-color="#d9398a"/>
    </linearGradient>
    <linearGradient id="th1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#13a0ad"/><stop offset="1" stop-color="#0E7C86"/></linearGradient>
    <linearGradient id="th2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5aa9ff"/><stop offset="1" stop-color="#2f6bd0"/></linearGradient>
    <linearGradient id="th3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffd166"/><stop offset="1" stop-color="#E0552B"/></linearGradient>
    <linearGradient id="th4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#b06bff"/><stop offset="1" stop-color="#6b58e0"/></linearGradient>
    <linearGradient id="th5" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff6f9c"/><stop offset="1" stop-color="#d9398a"/></linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/></filter>
    <clipPath id="feedClip"><rect x="20" y="92" width="300" height="520" rx="6"/></clipPath>
  </defs>

  <!-- phone body -->
  <rect x="6" y="6" width="328" height="648" rx="46" fill="url(#bezel)"/>
  <rect x="14" y="14" width="312" height="632" rx="40" fill="url(#screen)"/>

