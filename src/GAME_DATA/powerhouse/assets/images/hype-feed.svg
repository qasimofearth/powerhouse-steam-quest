      <!-- card 2 -->
      <g transform="translate(30,228)" filter="url(#soft)">
        <rect width="280" height="118" rx="12" fill="#222838"/>
        <rect width="60" height="118" rx="12" fill="url(#th2)"/><text x="30" y="68" font-size="26" text-anchor="middle">❄️</text>
        <circle cx="84" cy="26" r="11" fill="#41506e"/>
        <text x="104" y="24" fill="#cdd6e6" font-size="12" font-weight="700">@icequeen.fit</text>
        <rect x="206" y="16" width="60" height="18" rx="9" fill="#5aa9ff"/><text x="236" y="29" fill="#0a1b30" font-size="10" font-weight="900" text-anchor="middle">VIRAL AD</text>
        <text x="84" y="58" fill="#fff" font-size="16" font-weight="800">Cold Plunge = superpowers</text>
        <text x="84" y="80" fill="#9fb0c8" font-size="12">3am ice baths changed my life!!</text>
        <text x="84" y="103" fill="#ff6f9c" font-size="11" font-weight="700">♥ 120k   💬 8.4k   ↗ share</text>
      </g>

      <!-- card 3 -->
      <g transform="translate(30,356)" filter="url(#soft)">
        <rect width="280" height="118" rx="12" fill="#222838"/>
        <rect width="60" height="118" rx="12" fill="url(#th3)"/><text x="30" y="68" font-size="24" text-anchor="middle">💊</text>
        <circle cx="84" cy="26" r="11" fill="#41506e"/>
        <text x="104" y="24" fill="#cdd6e6" font-size="12" font-weight="700">@MitoMax_Official</text>
        <rect x="206" y="16" width="60" height="18" rx="9" fill="#ffd166"><animate attributeName="opacity" values="1;0.4;1" dur="0.8s" repeatCount="indefinite"/></rect>
        <text x="236" y="29" fill="#5a3d00" font-size="10" font-weight="900" text-anchor="middle">BUY NOW</text>
        <text x="84" y="58" fill="#fff" font-size="16" font-weight="800">$80 Mito-Boost™ pills</text>
        <text x="84" y="80" fill="#9fb0c8" font-size="12">Only 3 left! ⏰ 80% OFF today</text>
        <text x="84" y="103" fill="#ffd166" font-size="11" font-weight="700">★★★★★ “miracle!” (paid)</text>
      </g>

      <!-- card 4 -->
      <g transform="translate(30,484)" filter="url(#soft)">
        <rect width="280" height="118" rx="12" fill="#222838"/>
        <rect width="60" height="118" rx="12" fill="url(#th4)"/><text x="30" y="68" font-size="26" text-anchor="middle">🫁</text>
        <circle cx="84" cy="26" r="11" fill="#41506e"/>
        <text x="104" y="24" fill="#cdd6e6" font-size="12" font-weight="700">@breathe.guru</text>
        <rect x="206" y="16" width="60" height="18" rx="9" fill="#b06bff"/><text x="236" y="29" fill="#fff" font-size="10" font-weight="900" text-anchor="middle">#ENERGY</text>
